name: Release

# Free-tier release workflow. Fires on a pushed tag like "v1.0.0".
#
# What this does:
#   1. Build a Release-configuration archive
#   2. Export the .app, ad-hoc sign it (no Apple Developer cert required)
#   3. Stage with a /Applications symlink + roll into a UDZO DMG via
#      hdiutil (the format every commercial Mac app uses)
#   4. Compute SHA256 (the Homebrew cask formula needs it)
#   5. Attach AirAssist-<version>.dmg + SHA256SUMS.txt to the GitHub Release
#
# Users install via `brew install --cask` from the homebrew-airassist tap —
# Homebrew downloads with curl (no quarantine attribute set), macOS trusts
# ad-hoc signed locally-installed binaries, Gatekeeper stays quiet.
#
# Upgrade path when we move to the $99 Developer ID tier later:
#   - Drop in apple-actions/import-codesign-certs@v2
#   - Replace `codesign -s -` with the Developer ID identity
#   - Add `xcrun notarytool submit --wait` + `xcrun stapler staple`
#   - Keep everything else the same
#
# Repository secrets needed TODAY: none.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build & publish release
    # See ci.yml for rationale on macos-15 — Swift 6 + SDK 15 require
    # Xcode 16, which is default on macos-15 runners but not macos-14.
    runs-on: macos-15
    timeout-minutes: 30

    permissions:
      # Needed so softprops/action-gh-release can write to the Release.
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        if: hashFiles('project.yml') != ''
        run: brew install xcodegen

      - name: Generate Xcode project
        if: hashFiles('project.yml') != ''
        run: xcodegen generate

      - name: Archive
        run: |
          set -o pipefail
          # Archive with ad-hoc signing. `CODE_SIGN_IDENTITY=-` is the
          # ad-hoc identity; `CODE_SIGNING_REQUIRED=NO` because we're
          # deliberately not using a real cert.
          xcodebuild \
            -project AirAssist.xcodeproj \
            -scheme AirAssist \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath build/AirAssist.xcarchive \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            archive

      - name: Export .app from archive
        run: |
          set -o pipefail
          mkdir -p build/export
          # The archive already contains a signed (ad-hoc) .app. We
          # just need to copy it out — no need for xcodebuild
          # -exportArchive which requires an exportOptions.plist tuned
          # for Developer ID.
          cp -R "build/AirAssist.xcarchive/Products/Applications/AirAssist.app" "build/export/AirAssist.app"

      - name: Re-sign ad-hoc (deep, top to bottom)
        run: |
          set -o pipefail
          # Belt-and-braces: re-sign the exported bundle top-to-bottom
          # so every nested framework / embedded binary has a
          # consistent ad-hoc signature. `--deep` is deprecated for
          # Developer ID but still valid for ad-hoc, and the simplest
          # way to get a clean signature on a SwiftUI app.
          codesign --force --deep --sign - "build/export/AirAssist.app"
          codesign --verify --verbose=2 "build/export/AirAssist.app"

      - name: Package as DMG
        id: zip
        run: |
          set -o pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="AirAssist-${VERSION}.dmg"

          # Stage in a folder with a /Applications symlink alongside the
          # app, so the mounted volume gives users the familiar
          # "drag the icon to the Applications shortcut" install
          # experience that every commercial Mac app has trained them
          # on. hdiutil rolls the staging folder into a single .dmg.
          STAGING="build/dmg-staging"
          mkdir -p "${STAGING}"
          cp -R "build/export/AirAssist.app" "${STAGING}/"
          ln -s /Applications "${STAGING}/Applications"

          # UDZO = zlib-compressed read-only image. Standard format
          # macOS apps ship with — small, mounts instantly, immutable
          # so the app can't be tampered with after we sign it.
          # Volume name is what shows up in Finder when the user
          # mounts it ("Air Assist"), distinct from the file name.
          hdiutil create \
            -volname "Air Assist" \
            -srcfolder "${STAGING}" \
            -ov \
            -format UDZO \
            "${DMG_NAME}"

          SHA=$(shasum -a 256 "${DMG_NAME}" | cut -d ' ' -f 1)
          SIZE=$(stat -f%z "${DMG_NAME}")
          # Output names kept as `zip_*` for backwards compatibility
          # with the rest of the workflow steps that reference them
          # (release body, files block, artifact upload). Renaming
          # them adds churn for no gain — they're internal. New step
          # also exposes `dmg_name`/`dmg_path` aliases for clarity if
          # we ever revisit this section.
          echo "zip_name=${DMG_NAME}"       >> "$GITHUB_OUTPUT"
          echo "zip_path=${DMG_NAME}"       >> "$GITHUB_OUTPUT"
          echo "dmg_name=${DMG_NAME}"       >> "$GITHUB_OUTPUT"
          echo "dmg_path=${DMG_NAME}"       >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA}"              >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"         >> "$GITHUB_OUTPUT"
          echo "size_bytes=${SIZE}"         >> "$GITHUB_OUTPUT"
          # SHA256SUMS.txt drives the Homebrew tap auto-bump workflow
          # (homebrew-tap-bump.yml). Format is `<sha>  <filename>` so
          # the cask formula can verify the download.
          echo "${SHA}  ${DMG_NAME}" > SHA256SUMS.txt

      - name: Smoke-test the signed bundle
        run: |
          set -o pipefail
          # `spctl --assess` is what Gatekeeper runs. For ad-hoc signed
          # apps this will report "rejected" with source "Unnotarized
          # Developer ID" or similar — that's expected and doesn't
          # block the release; Homebrew's install path side-steps
          # Gatekeeper anyway. We only fail the job if the signature
          # itself is corrupt.
          codesign --verify --deep --strict --verbose=2 "build/export/AirAssist.app"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # `tag_name` defaults to the pushed tag; keep it implicit.
          name: Air Assist ${{ steps.zip.outputs.version }}
          body: |
            ## Air Assist ${{ steps.zip.outputs.version }}

            Ad-hoc signed, unnotarized build. See [CHANGELOG.md](../blob/main/CHANGELOG.md)
            for what's new.

            ### Install (recommended)

            First-time install:

            ```bash
            brew install --cask sjschillinger/airassist/airassist
            ```

            Already have Air Assist? Upgrade in place:

            ```bash
            brew upgrade --cask airassist
            ```

            ### Manual install

            1. Download `${{ steps.zip.outputs.dmg_name }}` below.
            2. Double-click to mount, drag `AirAssist.app` to the
               Applications shortcut, then eject the volume.
            3. First-launch only — run once in Terminal to clear the
               quarantine attribute macOS adds to browser downloads:
               ```
               xattr -dr com.apple.quarantine /Applications/AirAssist.app
               ```
               (Homebrew does this for you; manual downloaders see the
               "damaged" dialog without it.)

            ### Verify

            ```
            shasum -a 256 ${{ steps.zip.outputs.dmg_name }}
            # should match:
            ${{ steps.zip.outputs.sha256 }}
            ```
          draft: true            # stays draft until you explicitly publish
          prerelease: false
          files: |
            ${{ steps.zip.outputs.zip_path }}
            SHA256SUMS.txt

      - name: Upload build as artifact (debug / fallback)
        uses: actions/upload-artifact@v4
        with:
          name: AirAssist-${{ steps.zip.outputs.version }}
          path: ${{ steps.zip.outputs.zip_path }}
          retention-days: 14
