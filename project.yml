name: AirAssist
options:
  bundleIdPrefix: com.sjschillinger
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  usesTabs: false
  indentWidth: 4
  tabWidth: 4

packages: {}

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_ENABLE_OBJC_WEAK: YES
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_STRICT_OBJC_MSGSEND: YES
    GCC_C_LANGUAGE_STANDARD: gnu17
    SWIFT_EMIT_LOC_STRINGS: YES
    # Apple Silicon only
    ARCHS: arm64
    EXCLUDED_ARCHS[sdk=macosx*]: x86_64
    # Ad-hoc signing for personal use
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: YES
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      DEBUG_INFORMATION_FORMAT: dwarf
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  AirAssistTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: AirAssistTests
    dependencies:
      - target: AirAssist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sjschillinger.airassist.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AirAssist.app/Contents/MacOS/AirAssist"

  AirAssist:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: AirAssist
        excludes:
          - "**/.DS_Store"
    resources:
      - path: AirAssist/Assets.xcassets
    dependencies:
      - sdk: IOKit.framework
      - sdk: ServiceManagement.framework
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sjschillinger.airassist
        PRODUCT_NAME: AirAssist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: AirAssist/Info.plist
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_OBJC_BRIDGING_HEADER: AirAssist/IOKitBridge.h
    info:
      path: AirAssist/Info.plist
      properties:
        CFBundleName: Air Assist
        CFBundleDisplayName: Air Assist
        CFBundleIdentifier: com.sjschillinger.airassist
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleDevelopmentRegion: en
        LSApplicationCategoryType: public.app-category.utilities
        LSMinimumSystemVersion: "15.0"
        # Hide dock icon — menu bar only
        LSUIElement: true
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: "Copyright © 2026. All rights reserved."
        NSSupportsSuddenTermination: false
        # IOKit access for thermal sensors
        com.apple.security.temporary-exception.iokit-user-client-class:
          - IOHIDEventSystemUserClient
        # airassist:// URL scheme. Entry point for Shortcuts.app actions and
        # ad-hoc automations (Raycast, Alfred, `open airassist://pause`).
        CFBundleURLTypes:
          - CFBundleURLName: com.sjschillinger.airassist.url
            CFBundleTypeRole: Viewer
            CFBundleURLSchemes:
              - airassist
